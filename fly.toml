app = "forgetmenot"
primary_region = "bom"

[build]

[env]
  PORT = "8000"

[[mounts]]
  source = "forgetmenot_data"
  destination = "/app/backend/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
