services:
  - type: web
    name: forgetmenot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: LLM_ENCRYPTION_KEY
        generateValue: true
      - key: COGNEE_BASE_URL
        sync: false
      - key: COGNEE_API_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: SUMMARY_MODEL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://forgetmenot.onrender.com/api/auth/google/callback
    disk:
      name: data
      mountPath: /app/backend/data
      sizeGB: 1
